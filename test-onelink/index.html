<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OneLink Test</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      align-items: center;
      background: #f4f7fb;
      color: #182230;
      display: flex;
      font-family: Arial, sans-serif;
      justify-content: center;
      margin: 0;
      min-height: 100vh;
      padding: 24px;
    }

    main {
      display: grid;
      gap: 18px;
      max-width: 760px;
      width: 100%;
    }

    h1 {
      font-size: 28px;
      margin: 0;
      text-align: center;
    }

    .cards {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .card {
      background: #ffffff;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 22px;
    }

    .card h2 {
      font-size: 18px;
      margin: 0;
    }

    .card p {
      color: #475467;
      line-height: 1.5;
      margin: 0;
      overflow-wrap: anywhere;
    }

    .button {
      align-self: flex-start;
      background: #155eef;
      border-radius: 6px;
      color: #ffffff;
      display: inline-block;
      font-weight: 700;
      padding: 12px 16px;
      text-decoration: none;
    }

    .button:hover {
      background: #004eeb;
    }
  </style>
</head>
<body>
  <main>
    <h1>OneLink Test</h1>
    <section class="cards" aria-label="KinShield links">
      <article class="card">
        <h2>QA App</h2>
        <p>https://qa-app-kinshield.qualgo.dev/</p>
        <a class="button" href="https://qa-app-kinshield.qualgo.dev/">Open QA App</a>
      </article>

      <article class="card">
        <h2>Production App</h2>
        <p>https://app.getkinshield.com/</p>
        <a class="button" href="https://app.getkinshield.com/">Open Production App</a>
      </article>
    </section>
  </main>
</body>
</html>
